appId: com.disparazap.app
productName: DisparaZAP
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  shortcutName: DisparaZAP
  uninstallDisplayName: "DisparaZAP ${version}"
extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
